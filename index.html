<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      <!-- type="image/x-icon" -->
      sizes="96x96"
    />

    <title>QR code generator | devChallenges.io</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <link rel="stylesheet" href="style.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
      }

      .author-info a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <div class="container">

    <img src="resources/Logo.svg" alt="Logo" class="logo">

    <div class="inputBox">

        <input
            type="url"
            id="urlenteredid"
            placeholder="Enter a URL"
            autocomplete="off"
        >

        <button id="generateQr">
            QR Code
        </button>

    </div>

    <p id="errorMsg" class="error">
        Please enter a URL first.
    </p>

    <!-- Hidden until QR is generated -->
    <div class="qrbox">

        <div class="qrCircle">
            <div class="qrimg" id="qrimgId"></div>
        </div>

        <div class="qrbtns">

            <button id="downloadBtn">
                Download
                <img src="resources/download.png" width="18">
            </button>

            <button id="shareBtn">
                Share
                <img src="resources/shareicon.png" width="18">
            </button>

        </div>

    </div>

</div>

<div class="author-info">
    Coded by <a href="#">Samir Bastola</a> |
    Challenge by
    <a href="https://www.devchallenges.io?ref=challenge" target="_blank">
        devChallenges.io
    </a>
</div>
  </body>
  <script src="script.js"></script>
</html>
